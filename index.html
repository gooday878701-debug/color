<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>推荐色卡</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
        min-height: 100vh;
      }
      
      .font-display {
        font-family: 'Cormorant Garamond', serif;
      }
      
      header {
        padding: 4rem 2rem;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      
      header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 25%;
        width: 24rem;
        height: 24rem;
        background: rgba(59, 130, 246, 0.1);
        border-radius: 50%;
        filter: blur(100px);
      }
      
      header::after {
        content: '';
        position: absolute;
        top: 33%;
        right: 25%;
        width: 20rem;
        height: 20rem;
        background: rgba(147, 51, 234, 0.1);
        border-radius: 50%;
        filter: blur(100px);
      }
      
      header h1 {
        font-size: 3.5rem;
        font-weight: 700;
        color: white;
        margin-bottom: 1rem;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        position: relative;
        z-index: 1;
      }
      
      header p {
        font-size: 1.125rem;
        color: #9ca3af;
        max-width: 2xl;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }
      
      .tags {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1rem;
        position: relative;
        z-index: 1;
      }
      
      .tag {
        padding: 0.5rem 1rem;
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(8px);
        border-radius: 9999px;
        font-size: 0.75rem;
        color: #d1d5db;
      }
      
      main {
        max-width: 7xl;
        margin: 0 auto;
        padding: 0 1rem;
        padding-bottom: 5rem;
      }
      
      .palette {
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(12px);
        border-radius: 1rem;
        padding: 2rem;
        margin-bottom: 3rem;
        border: 1px solid rgba(51, 65, 85, 0.5);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      
      .palette h3 {
        font-size: 1.25rem;
        font-weight: 600;
        color: white;
        margin-bottom: 0.5rem;
      }
      
      .palette p {
        font-size: 0.875rem;
        color: #9ca3af;
        margin-bottom: 1.5rem;
      }
      
      .colors {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      
      @media (min-width: 640px) {
        .colors {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      
      @media (min-width: 1024px) {
        .colors {
          grid-template-columns: repeat(6, 1fr);
        }
      }
      
      .color-card {
        background: #1e293b;
        border-radius: 0.75rem;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      
      .color-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      }
      
      .color-swatch {
        height: 7rem;
        position: relative;
        transition: transform 0.3s ease;
      }
      
      .color-card:hover .color-swatch {
        transform: scale(1.1);
      }
      
      .color-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .color-card:hover .color-overlay {
        opacity: 1;
      }
      
      .copy-btn {
        padding: 0.5rem 1rem;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 600;
        color: #1f2937;
        transition: all 0.3s ease;
      }
      
      .copy-btn.copied {
        background: #22c55e;
        color: white;
        transform: scale(1.1);
      }
      
      .color-info {
        padding: 0.75rem;
        background: rgba(15, 23, 42, 0.8);
      }
      
      .color-name {
        font-size: 0.75rem;
        font-weight: 500;
        color: #e5e7eb;
        margin-bottom: 0.25rem;
      }
      
      .color-hex {
        font-size: 0.75rem;
        font-family: 'Courier New', monospace;
        color: #6b7280;
        letter-spacing: 0.05em;
      }
      
      footer {
        padding: 2rem;
        text-align: center;
        border-top: 1px solid rgba(51, 65, 85, 0.5);
      }
      
      footer p {
        font-size: 0.875rem;
        color: #6b7280;
      }
      
      .toast {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        background: #22c55e;
        color: white;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        opacity: 0;
        transform: translateX(100%);
        transition: all 0.3s ease;
        z-index: 100;
      }
      
      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }
      
      .toast svg {
        width: 1.25rem;
        height: 1.25rem;
      }
      
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(0.5rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .animate-fade-in {
        animation: fade-in 0.6s ease-out forwards;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 class="font-display">推荐色卡</h1>
      <p>精选配色方案，为您的设计注入灵感</p>
      <div class="tags">
        <span class="tag">点击复制色值</span>
        <span class="tag">8 套配色方案</span>
      </div>
    </header>
    
    <main id="app"></main>
    
    <footer>
      <p>点击任意颜色块即可复制色值到剪贴板</p>
    </footer>
    
    <div id="toast" class="toast">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
      <span id="toast-text">已复制</span>
    </div>
    
    <script>
      const colorPalettes = [
        {
          name: '经典配色',
          description: '黑白灰的永恒经典组合',
          colors: [
            { name: '纯黑', hex: '#000000' },
            { name: '深灰', hex: '#333333' },
            { name: '中灰', hex: '#666666' },
            { name: '浅灰', hex: '#999999' },
            { name: '接近白', hex: '#E5E5E5' },
            { name: '纯白', hex: '#FFFFFF' },
          ],
        },
        {
          name: '自然大地',
          description: '温暖的大地色系',
          colors: [
            { name: '深棕', hex: '#4A3728' },
            { name: '咖啡', hex: '#704214' },
            { name: '驼色', hex: '#C4A35A' },
            { name: '米色', hex: '#F5F5DC' },
            { name: '沙色', hex: '#C2B280' },
            { name: '陶土', hex: '#A0522D' },
          ],
        },
        {
          name: '海洋深蓝',
          description: '宁静的海洋色调',
          colors: [
            { name: '深海', hex: '#001A33' },
            { name: '海军蓝', hex: '#1E3A5F' },
            { name: '天蓝', hex: '#3498DB' },
            { name: '浅蓝', hex: '#87CEEB' },
            { name: '薄荷', hex: '#00CED1' },
            { name: '浪花', hex: '#B0E0E6' },
          ],
        },
        {
          name: '森林绿意',
          description: '清新的自然绿色',
          colors: [
            { name: '墨绿', hex: '#003300' },
            { name: '深绿', hex: '#014421' },
            { name: '翠绿', hex: '#228B22' },
            { name: '草绿', hex: '#7CFC00' },
            { name: '薄荷绿', hex: '#98FB98' },
            { name: '嫩芽', hex: '#90EE90' },
          ],
        },
        {
          name: '日落余晖',
          description: '温暖的橙红色调',
          colors: [
            { name: '深红', hex: '#8B0000' },
            { name: '砖红', hex: '#B22222' },
            { name: '橙红', hex: '#FF4500' },
            { name: '橙色', hex: '#FFA500' },
            { name: '金黄', hex: '#FFD700' },
            { name: '桃色', hex: '#FFB6C1' },
          ],
        },
        {
          name: '梦幻紫色',
          description: '神秘优雅的紫色系',
          colors: [
            { name: '深紫', hex: '#3D0C45' },
            { name: '紫罗兰', hex: '#4B0082' },
            { name: '紫色', hex: '#800080' },
            { name: '梅红', hex: '#9B59B6' },
            { name: '薰衣草', hex: '#E6E6FA' },
            { name: '淡紫', hex: '#DDA0DD' },
          ],
        },
        {
          name: '商务专业',
          description: '稳重的商务配色',
          colors: [
            { name: '深蓝', hex: '#0A1628' },
            { name: '炭灰', hex: '#2C3E50' },
            { name: '钢蓝', hex: '#34495E' },
            { name: '浅灰蓝', hex: '#5D6D7E' },
            { name: '银灰', hex: '#BDC3C7' },
            { name: '象牙白', hex: '#FFFFF0' },
          ],
        },
        {
          name: '活力青春',
          description: '活泼明亮的配色',
          colors: [
            { name: '活力红', hex: '#E74C3C' },
            { name: '活力橙', hex: '#F39C12' },
            { name: '活力黄', hex: '#F1C40F' },
            { name: '活力绿', hex: '#2ECC71' },
            { name: '活力蓝', hex: '#3498DB' },
            { name: '活力紫', hex: '#9B59B6' },
          ],
        },
      ];
      
      const app = document.getElementById('app');
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toast-text');
      
      function isDark(hex) {
        const color = hex.replace('#', '');
        const r = parseInt(color.substring(0, 2), 16);
        const g = parseInt(color.substring(2, 4), 16);
        const b = parseInt(color.substring(4, 6), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        return brightness < 128;
      }
      
      function showToast(message) {
        toastText.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2500);
      }
      
      function handleColorClick(hex) {
        navigator.clipboard.writeText(hex).then(() => {
          showToast(`已复制: ${hex}`);
        });
      }
      
      colorPalettes.forEach((palette, paletteIndex) => {
        const paletteEl = document.createElement('div');
        paletteEl.className = 'palette animate-fade-in';
        paletteEl.style.animationDelay = `${paletteIndex * 150}ms`;
        
        paletteEl.innerHTML = `
          <h3>${palette.name}</h3>
          <p>${palette.description}</p>
          <div class="colors">
            ${palette.colors.map((color, colorIndex) => `
              <div class="color-card" style="animation-delay: ${colorIndex * 50}ms">
                <div class="color-swatch" style="background-color: ${color.hex}">
                  <div class="color-overlay">
                    <span class="copy-btn">复制</span>
                  </div>
                </div>
                <div class="color-info">
                  <div class="color-name" style="color: ${isDark(color.hex) ? '#ffffff' : '#d1d5db'}">${color.name}</div>
                  <div class="color-hex">${color.hex}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        
        app.appendChild(paletteEl);
        
        const cards = paletteEl.querySelectorAll('.color-card');
        cards.forEach((card, i) => {
          card.addEventListener('click', () => {
            const btn = card.querySelector('.copy-btn');
            btn.classList.add('copied');
            btn.textContent = '✓';
            handleColorClick(palette.colors[i].hex);
            setTimeout(() => {
              btn.classList.remove('copied');
              btn.textContent = '复制';
            }, 2000);
          });
        });
      });
    </script>
  </body>
</html>
